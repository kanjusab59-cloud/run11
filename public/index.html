<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Profile Launcher - User</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Chrome Profile Launcher</h1>
            <p>Launch your Chrome profiles with admin approval</p>
        </div>

        <!-- Status Card -->
        <div class="status-card" id="statusCard">
            <div class="status-icon" id="statusIcon">⏳</div>
            <div class="status-text" id="statusText">Checking access status...</div>
            <div class="status-time" id="statusTime"></div>
        </div>

        <!-- Request Form -->
        <div class="request-card" id="requestCard" style="display: none;">
            <h3>📝 Request Access</h3>
            <p>You need admin approval to use this tool.</p>
            <div class="device-info" id="deviceInfo"></div>
            <div class="profiles-preview" id="profilesPreview"></div>
            <button class="btn btn-primary" onclick="requestAccess()">📨 Send Request to Admin</button>
        </div>

        <!-- Main App (shown after approval) -->
        <div class="app-card" id="appCard" style="display: none;">
            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Enter profile numbers (e.g., 1,2,3 or 1 2 3)">
                    <button onclick="launchProfiles()">▶ RUN</button>
                </div>
                <div class="examples">
                    💡 Try: 
                    <span onclick="setExample('1,2,3')">1,2,3</span>
                    <span onclick="setExample('1 2 3')">1 2 3</span>
                    <span onclick="setExample('ALL')">ALL</span>
                </div>
            </div>

            <div class="profiles-list" id="profilesList">
                <div class="loading">🔄 Loading Chrome profiles...</div>
            </div>
        </div>
    </div>

    <script>
        let userId = null;
        let profiles = [];
        let socket = null;

        // ইউজার আইডি তৈরি করা (ডিভাইস ভিত্তিক)
        function getUserId() {
            let id = localStorage.getItem('chrome_launcher_id');
            if (!id) {
                id = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('chrome_launcher_id', id);
            }
            return id;
        }

        // ডিভাইসের তথ্য পাওয়া
        async function getDeviceInfo() {
            const info = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language
            };
            return info;
        }

        // প্রোফাইল স্ক্যান করা (backend এর মাধ্যমে)
        async function scanProfiles() {
            try {
                const response = await fetch('/api/get-profiles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: userId })
                });
                const data = await response.json();
                
                if (data.success) {
                    profiles = data.profiles;
                    displayProfiles();
                    if (data.remainingTime) {
                        document.getElementById('statusTime').innerHTML = `⏱️ Remaining: ${data.remainingTime}`;
                    }
                    return true;
                } else {
                    checkStatus();
                    return false;
                }
            } catch(e) {
                console.error(e);
                return false;
            }
        }

        function displayProfiles() {
            const container = document.getElementById('profilesList');
            if (!profiles || profiles.length === 0) {
                container.innerHTML = '<div class="loading">📭 No Chrome profiles found</div>';
                return;
            }

            let html = '';
            profiles.forEach((profile, index) => {
                html += `
                    <div class="profile-card" ondblclick="launchSingleProfile(${index + 1})">
                        <div class="profile-number">${index + 1}</div>
                        <div class="profile-icon">${profile.hasPicture ? '📷' : '👤'}</div>
                        <div class="profile-info">
                            <div class="profile-name">${escapeHtml(profile.name)}</div>
                            <div class="profile-folder">📁 ${profile.folder}</div>
                            <div class="profile-pic-status ${profile.hasPicture ? 'has-pic' : 'no-pic'}">
                                ${profile.hasPicture ? '✅ Has profile picture' : '❌ No profile picture'}
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // স্ট্যাটাস চেক করা
        async function checkStatus() {
            try {
                const response = await fetch('/api/check-status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: userId })
                });
                const data = await response.json();
                
                if (data.status === 'approved') {
                    document.getElementById('statusCard').style.background = '#e8f5e9';
                    document.getElementById('statusIcon').innerHTML = '✅';
                    document.getElementById('statusText').innerHTML = 'Access Approved! You can use the launcher.';
                    document.getElementById('requestCard').style.display = 'none';
                    document.getElementById('appCard').style.display = 'block';
                    await scanProfiles();
                } else if (data.status === 'pending') {
                    document.getElementById('statusCard').style.background = '#fff3e0';
                    document.getElementById('statusIcon').innerHTML = '⏳';
                    document.getElementById('statusText').innerHTML = 'Request Pending. Waiting for admin approval...';
                    document.getElementById('requestCard').style.display = 'none';
                    document.getElementById('appCard').style.display = 'none';
                } else {
                    document.getElementById('statusCard').style.background = '#ffebee';
                    document.getElementById('statusIcon').innerHTML = '🔒';
                    document.getElementById('statusText').innerHTML = 'No Access. Send request to admin.';
                    document.getElementById('requestCard').style.display = 'block';
                    document.getElementById('appCard').style.display = 'none';
                    
                    // প্রোফাইল প্রিভিউ দেখানো (শুধু তথ্যের জন্য)
                    await showProfilesPreview();
                }
            } catch(e) {
                console.error(e);
            }
        }

        async function showProfilesPreview() {
            // এখানে শুধু প্রোফাইলের সংখ্যা দেখানো হবে (বিস্তারিত নয়)
            const deviceInfo = await getDeviceInfo();
            document.getElementById('deviceInfo').innerHTML = `
                <strong>🖥️ Device:</strong> ${deviceInfo.platform}<br>
                <strong>🆔 User ID:</strong> ${userId}
            `;
            
            // ব্যাকএন্ড থেকে প্রোফাইল কাউন্ট নেয়া (অ্যাপ্রুভ ছাড়া)
            try {
                const response = await fetch('/api/get-profiles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: userId })
                });
                const data = await response.json();
                if (data.success && data.profiles) {
                    document.getElementById('profilesPreview').innerHTML = `
                        <strong>📊 Detected Profiles:</strong> ${data.profiles.length} profile(s) found
                    `;
                }
            } catch(e) {}
        }

        // রিকোয়েস্ট সেন্ড করা
        async function requestAccess() {
            const deviceInfo = await getDeviceInfo();
            const profilesData = await getProfilesForRequest();
            
            const response = await fetch('/api/request-access', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: userId,
                    deviceName: deviceInfo.platform + ' - ' + deviceInfo.userAgent.substring(0, 50),
                    profiles: profilesData
                })
            });
            
            const data = await response.json();
            if (data.success) {
                alert('✅ Request sent to admin! Please wait for approval.');
                checkStatus();
            } else {
                alert('❌ ' + data.message);
            }
        }

        async function getProfilesForRequest() {
            // প্রোফাইলের সংখ্যা এবং নাম (এনক্রিপ্টেড না)
            try {
                const response = await fetch('/api/get-profiles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: userId })
                });
                const data = await response.json();
                if (data.success && data.profiles) {
                    return data.profiles.map(p => ({ name: p.name, hasPicture: p.hasPicture }));
                }
            } catch(e) {}
            return [];
        }

        // লঞ্চ ফাংশন
        async function launchSingleProfile(number) {
            await launchProfilesByNumbers([number]);
        }

        async function launchProfiles() {
            let input = document.getElementById('searchInput').value.trim();
            if (!input) {
                alert('Please enter profile numbers!');
                return;
            }

            input = input.replace(/\s+/g, ',');
            input = input.replace(/,,+/g, ',');
            document.getElementById('searchInput').value = input;

            let numbers = [];
            if (input.toUpperCase() === 'ALL') {
                numbers = profiles.map((_, idx) => idx + 1);
            } else {
                numbers = input.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
            }

            if (numbers.length === 0) {
                alert('No valid numbers found!');
                return;
            }

            await launchProfilesByNumbers(numbers);
        }

        async function launchProfilesByNumbers(numbers) {
            try {
                const response = await fetch('/api/launch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: userId, numbers: numbers })
                });
                
                const data = await response.json();
                if (data.success) {
                    alert(`✅ ${data.message}`);
                    if (data.remainingTime) {
                        document.getElementById('statusTime').innerHTML = `⏱️ Remaining: ${data.remainingTime}`;
                    }
                } else {
                    alert(`❌ ${data.message}`);
                    checkStatus();
                }
            } catch(error) {
                alert('❌ Launch failed!');
            }
        }

        function setExample(value) {
            document.getElementById('searchInput').value = value;
            launchProfiles();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Socket.io connection
        function setupSocket() {
            socket = io();
            socket.on('request-approved', (data) => {
                if (data.userId === userId) {
                    alert('✅ Your request has been APPROVED! You can now use the launcher.');
                    checkStatus();
                }
            });
            socket.on('request-rejected', (data) => {
                if (data.userId === userId) {
                    alert('❌ Your request has been REJECTED by admin.');
                    checkStatus();
                }
            });
        }

        // Initialize
        userId = getUserId();
        setupSocket();
        checkStatus();
        
        // প্রতি 30 সেকেন্ডে স্ট্যাটাস চেক
        setInterval(checkStatus, 30000);
    </script>
</body>
</html>
