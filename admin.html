<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Chrome Launcher</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👑 Admin Dashboard</h1>
            <p>Manage user requests for Chrome Profile Launcher</p>
        </div>

        <div class="admin-stats">
            <div class="stat-card">
                <div class="stat-number" id="pendingCount">0</div>
                <div class="stat-label">Pending Requests</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="approvedCount">0</div>
                <div class="stat-label">Approved Users</div>
            </div>
        </div>

        <div class="requests-section">
            <h3>📋 Pending Requests</h3>
            <div id="requestsList" class="requests-list">
                <div class="loading">Loading requests...</div>
            </div>
        </div>

        <div class="approved-section">
            <h3>✅ Approved Users</h3>
            <div id="approvedList" class="requests-list">
                <div class="loading">Loading approved users...</div>
            </div>
        </div>
    </div>

    <script>
        let socket = null;

        async function loadRequests() {
            try {
                const response = await fetch('/api/admin/requests');
                const requests = await response.json();
                
                const pending = requests.filter(r => r.status === 'pending');
                const approved = requests.filter(r => r.status === 'approved');
                
                document.getElementById('pendingCount').innerHTML = pending.length;
                document.getElementById('approvedCount').innerHTML = approved.length;
                
                displayRequests(pending, approved);
            } catch(e) {
                console.error(e);
            }
        }

        function displayRequests(pending, approved) {
            // Pending requests
            const pendingContainer = document.getElementById('requestsList');
            if (pending.length === 0) {
                pendingContainer.innerHTML = '<div class="empty-state">🎉 No pending requests!</div>';
            } else {
                let html = '';
                pending.forEach(req => {
                    html += `
                        <div class="request-card">
                            <div class="request-header">
                                <span class="request-id">🆔 ${req.userId}</span>
                                <span class="request-time">📅 ${new Date(req.timestamp).toLocaleString()}</span>
                            </div>
                            <div class="request-device">💻 Device: ${req.deviceName}</div>
                            <div class="request-profiles">
                                📊 Profiles: ${req.profiles.length} profile(s) found
                                <div class="profile-list">
                                    ${req.profiles.map(p => `<span class="profile-tag">${p.name} ${p.hasPicture ? '📷' : '👤'}</span>`).join('')}
                                </div>
                            </div>
                            <div class="request-actions">
                                <select id="hours_${req.userId}" class="hours-select">
                                    <option value="1">1 hour</option>
                                    <option value="3">3 hours</option>
                                    <option value="6">6 hours</option>
                                    <option value="12">12 hours</option>
                                    <option value="24" selected>24 hours</option>
                                    <option value="48">48 hours</option>
                                    <option value="72">72 hours</option>
                                </select>
                                <button class="btn-approve" onclick="approveRequest('${req.userId}')">✅ Approve</button>
                                <button class="btn-reject" onclick="rejectRequest('${req.userId}')">❌ Reject</button>
                            </div>
                        </div>
                    `;
                });
                pendingContainer.innerHTML = html;
            }
            
            // Approved users
            const approvedContainer = document.getElementById('approvedList');
            if (approved.length === 0) {
                approvedContainer.innerHTML = '<div class="empty-state">No approved users yet.</div>';
            } else {
                let html = '';
                approved.forEach(req => {
                    const expiresAt = new Date(req.expiresAt || new Date().getTime() + 86400000);
                    const isExpired = expiresAt < new Date();
                    html += `
                        <div class="request-card ${isExpired ? 'expired' : ''}">
                            <div class="request-header">
                                <span class="request-id">🆔 ${req.userId}</span>
                                <span class="request-time">📅 ${new Date(req.timestamp).toLocaleString()}</span>
                            </div>
                            <div class="request-device">💻 Device: ${req.deviceName}</div>
                            <div class="request-expiry">⏱️ Expires: ${expiresAt.toLocaleString()} ${isExpired ? '(EXPIRED)' : ''}</div>
                        </div>
                    `;
                });
                approvedContainer.innerHTML = html;
            }
        }

        async function approveRequest(userId) {
            const hours = document.getElementById(`hours_${userId}`).value;
            
            const response = await fetch('/api/admin/approve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, hours })
            });
            
            const data = await response.json();
            if (data.success) {
                alert(`✅ User ${userId} approved for ${hours} hours!`);
                loadRequests();
            } else {
                alert('❌ Failed to approve!');
            }
        }

        async function rejectRequest(userId) {
            if (!confirm(`Reject request from ${userId}?`)) return;
            
            const response = await fetch('/api/admin/reject', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId })
            });
            
            const data = await response.json();
            if (data.success) {
                alert(`❌ User ${userId} rejected!`);
                loadRequests();
            } else {
                alert('❌ Failed to reject!');
            }
        }

        function setupSocket() {
            socket = io();
            socket.on('new-request', (data) => {
                alert(`🔔 New request from ${data.deviceName || data.userId}!`);
                loadRequests();
            });
        }

        setupSocket();
        loadRequests();
        
        // প্রতি 10 সেকেন্ডে রিফ্রেশ
        setInterval(loadRequests, 10000);
    </script>
</body>
</html>
